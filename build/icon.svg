<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep indigo to violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>

    <!-- Page gradient: warm white with subtle cool tint -->
    <linearGradient id="page" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#F8FAFF"/>
      <stop offset="100%" stop-color="#E8ECF4"/>
    </linearGradient>

    <!-- Fold gradient -->
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <!-- Accent gradient: electric blue ribbon -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B7FFF"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Glow filter for the accent ribbon -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle shadow for the page -->
    <filter id="pageShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F0A2A" flood-opacity="0.45"/>
    </filter>

    <!-- Corner fold shadow -->
    <filter id="foldShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="-2" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!--
    Full-bleed square background — NO rounded corners.
    macOS applies its own squircle mask; Windows uses the square as-is.
  -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle radial highlight -->
  <circle cx="400" cy="380" r="440" fill="white" opacity="0.04"/>

  <!--
    Content group — scaled to ~80% and centered per macOS HIG.
    Transform: translate to center, then scale 0.8.
    Center = 512. Offset = 512 * (1 - 0.8) = 102.4
  -->
  <g transform="translate(102, 102) scale(0.8)">
    <!-- Page body with dog-ear -->
    <g filter="url(#pageShadow)">
      <path d="
        M 280 168
        L 648 168
        L 744 264
        L 744 856
        L 280 856
        Z
      " fill="url(#page)"/>
    </g>

    <!-- Fold triangle -->
    <g filter="url(#foldShadow)">
      <path d="
        M 648 168
        L 744 264
        L 648 264
        Z
      " fill="url(#fold)"/>
    </g>

    <!-- Fold crease lines -->
    <line x1="648" y1="168" x2="648" y2="264" stroke="#94A3B8" stroke-width="1.2" opacity="0.4"/>
    <line x1="648" y1="264" x2="744" y2="264" stroke="#94A3B8" stroke-width="1.2" opacity="0.4"/>

    <!-- Text lines on page -->
    <g opacity="0.18">
      <rect x="340" y="340" width="340" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="376" width="280" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="412" width="320" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="472" width="340" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="508" width="240" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="568" width="310" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="604" width="280" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="640" width="340" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="700" width="260" height="12" rx="6" fill="#334155"/>
      <rect x="340" y="736" width="300" height="12" rx="6" fill="#334155"/>
    </g>

    <!-- Diagonal accent ribbon with glow -->
    <g filter="url(#glow)">
      <path d="
        M 210 590
        Q 400 480, 512 460
        Q 624 440, 814 530
        L 814 570
        Q 624 480, 512 500
        Q 400 520, 210 630
        Z
      " fill="url(#accent)" opacity="0.92"/>
    </g>

    <!-- Second thinner ribbon -->
    <path d="
      M 230 650
      Q 400 560, 512 545
      Q 624 530, 794 600
      L 794 620
      Q 624 550, 512 565
      Q 400 580, 230 670
      Z
    " fill="url(#accent)" opacity="0.45"/>

    <!-- Sparkle dots -->
    <circle cx="380" cy="505" r="4" fill="white" opacity="0.7"/>
    <circle cx="520" cy="478" r="3" fill="white" opacity="0.5"/>
    <circle cx="660" cy="500" r="3.5" fill="white" opacity="0.6"/>
  </g>
</svg>
